<!DOCTYPE html>
<html>
<head>
    <title>Display Property Task 5</title>

    <style>

        h1{
            text-align: center;
        }

        /* Inline Menu */
        .menu{
            display: inline;
            background-color: yellow;
            padding: 10px;
            margin: 5px;
        }

        /* Inline Block Boxes */
        .box{
            display: inline-block;
            width: 120px;
            height: 120px;
            background-color: lightblue;
            margin: 10px;
            text-align: center;
            line-height: 120px;
            font-size: 20px;
        }

        /* Hidden Paragraph */
        .hide{
            display: none;
        }

    </style>

</head>
<body>

    <!-- Heading -->
    <h1>CSS Display Property</h1>

    <!-- Inline Menu -->
    <div class="menu">Home</div>
    <div class="menu">About</div>
    <div class="menu">Contact</div>

    <br><br>

    <!-- Inline Block Boxes -->
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>

    <!-- Hidden Paragraph -->
    <p class="hide">
        This paragraph is hidden.
    </p>

</body>
</html>
