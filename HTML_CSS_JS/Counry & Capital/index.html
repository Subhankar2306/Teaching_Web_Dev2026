<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Country and Capital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Country & Capital Finder</h1>

    <p>Select a country to display its capital city.</p>

    <div class="row">

        <label>Select Country:</label>

        <select id="country" onchange="showCapital()">

            <option value="">--Select--</option>
            <option value="New Delhi">India</option>
            <option value="Washington D.C.">USA</option>
            <option value="London">England</option>
            <option value="Tokyo">Japan</option>
            <option value="Dhaka">Bangladesh</option>
            <option value="Beijing">China</option>

        </select>

    </div>

    <div class="row">

        <label>Capital :</label>

        <input type="text" id="capital" readonly>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
