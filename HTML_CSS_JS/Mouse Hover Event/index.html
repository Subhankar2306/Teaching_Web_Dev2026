<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mouse Over Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Mouse Over Event</h1>

    <p>Move your mouse over the first box.</p>

    <div class="box-container">

        <div class="box" onmouseover="showMessage()">
            Mouse Over Me
        </div>

        <div class="box" id="message">
            Thank You
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
