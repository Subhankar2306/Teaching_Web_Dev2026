<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Form</title>
</head>
<body>
  <div id="div1" style="width: 500px; background-color: rgb(184, 213, 240); padding: 10px; margin-left: 400px; border: 5px solid rgb(228, 21, 21);" >
    <h1 style="text-align: center; color: blue;">This is Form</h1>
    <form >
      <label for="fname">First Name:</label>
      <input type="text" id="fname" name="Fname" placeholder="Amit Das" readonly><br><br>

      <label for="fname">Last Name:</label>
      <input type="text" id="fname" name="Lname"><br><br>

      <label for="Email">Email Address:</label>
      <input type="email" id="Email" name="email"><br><br>

      <label for="pass">Password:</label>
      <input type="password" id="pass" name="Password"><br><br>

      <label for="address">Address:</label>
      <textarea name="address" id="address" name="Address"></textarea>
      <br><br>

      <label for="mobileNo">Mobile No.:</label>
      <input type="tel" id="mobileNo" name="MobNo"><br><br>

      <label for="Gender">Gender:</label>
      <input type="radio"id="male" name="gender" value="Male">
      <label for="male">Male</label>
      <input type="radio" name="gender" id="female" value="Female">
      <label for="female">Female</label>
      <br><br>

      <label for="Course">Select Course:</label><br>
      <input type="checkbox" name="Course" id="html">
      <label for="html">HTML</label> <br><br>
      <input type="checkbox" name="Course" id="css">
      <label for="css">CSS</label> <br><br>
      <input type="checkbox" name="Course" id="javascript">
      <label for="javascript">JavaScript</label> <br><br>

      <label for="time">Choose Your Class Time:</label><br>
      <select name="Time" id="time">
        <option value="9">9:00am to 10:30am</option>
        <option value="10:30">10:30am to 12:00pm</option>
        <option value="12:00">12:00pm to 1:30pm</option>
      </select>
      <br><br>

       <label for="city">Choose Your City:</label><br>
      <select name="City" id="city">
        <optgroup label="India">
          <option value="Delhi">Delhi</option>
          <option value="Kolkata">Kolkata</option>
        </optgroup>
        <optgroup label="India">
          <option value="Delhi">Delhi</option>
          <option value="Kolkata">Kolkata</option>
        </optgroup>
        <br><br>
        <label for="pic">Uploade Picture:</label><br>
        <input type="file" name="Picture" id="pic">
        <br><br>
      </select>
      <br><br>


      <input type="submit" name="Submit" id="submit" >
      <input type="reset" name="Reset" id="reset"><br>
    </form>
  </div>
</body>
</html>
