<!DOCTYPE html>
<html>
<head>
    <title>Target Attribute Example</title>
</head>

<body>

    <h1>Target Attribute Example</h1>

    <hr>

    <h2>1. target="_self"</h2>

    <a href="about.html" target="_self">
        Open About Page (_self)
    </a>

    <p>
        The About page will open in the same browser tab.
    </p>

    <hr>

    <h2>2. target="_blank"</h2>

    <a href="about.html" target="_blank">
        Open About Page (_blank)
    </a>

    <p>
        The About page will open in a new browser tab.
    </p>

    <hr>

    <h2>3. Frames Example</h2>

    <a href="framepage.html">
        Open Frame Example
    </a>

</body>
</html>
